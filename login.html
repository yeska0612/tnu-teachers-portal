<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Багш нэвтрэх</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<section class="login-page">
  <div class="login-card">

    <h1>Нэвтрэх</h1>
    <p>Сургалтын материал оруулах, засах, устгах эрхтэй багш нар нэвтэрнэ.</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Багшийн имэйл</label>
        <input type="email" id="teacherId" placeholder="example@school.mn" required>
      </div>

      <div class="form-group">
        <label>Нууц үг</label>
        <input type="password" id="teacherPassword" placeholder="Нууц үг" required>
      </div>

      <p id="loginError" class="login-error"></p>

      <button type="submit" class="login-btn">Нэвтрэх</button>
    </form>

    <a href="training.html" class="back-link">← Сургалтын материал руу буцах</a>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
